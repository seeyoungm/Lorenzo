[memory]
path = "sample_data/memory_store.jsonl"
top_k = 5
retrieval_preselect_multiplier = 3
min_similarity_floor = 0.10
importance_weight = 0.10
recency_weight = 0.15
similarity_weight = 0.75
lexical_fallback_weight = 0.05
